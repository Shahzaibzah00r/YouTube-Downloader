name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax-check shell scripts
        run: |
          bash -n setup.sh
          bash -n download.sh
          bash -n install.sh
          bash -n "Open YTDownloader.command"
          bash -n "Open YouTube Downloader.command"
          bash -n scripts/build_app.sh
          bash -n scripts/build_macos.sh

      - name: Syntax-check Python
        run: |
          python3 -m py_compile yt_downloader.py
          python3 -m py_compile youtube_downloader_gui.py

      - name: Required project files
        run: |
          test -f README.md
          test -f LICENSE
          test -f yt_downloader.py
          test -f webui/index.html
          test -f webui/styles.css
          test -f webui/app.js
          test -f scripts/build_app.sh

      - name: Smoke-build .app + DMG
        run: |
          chmod +x scripts/build_app.sh
          VERSION="ci-${GITHUB_SHA::7}" ./scripts/build_app.sh
          test -d "dist/YTDownloader.app"
          test -f dist/YouTube-Downloader-macOS.dmg
          ls -lh dist/YouTube-Downloader-macOS.dmg

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTDownloader-macOS-ci
          path: dist/YouTube-Downloader-macOS.dmg
          if-no-files-found: error
          retention-days: 14
