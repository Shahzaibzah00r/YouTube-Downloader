name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.4.0)"
        required: true
        default: "1.4.0"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: AppleSilicon
            friendly: Apple Silicon (M1/M2/M3/M4)
          - os: macos-13
            label: Intel
            friendly: Intel Mac (x86_64)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW="${{ inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          if [[ "$RAW" == v* ]]; then
            TAG="$RAW"
            NUM="${RAW#v}"
          else
            TAG="v$RAW"
            NUM="$RAW"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
          echo "machine=$(uname -m)" >> "$GITHUB_OUTPUT"

      - name: Build installable .app + DMG
        env:
          VERSION: ${{ steps.ver.outputs.number }}
        run: |
          chmod +x scripts/build_app.sh
          ./scripts/build_app.sh
          echo "Built on $(uname -m) as ${{ matrix.label }}"
          ls -lh dist/*.dmg
          test -f "dist/YTDownloader-v${{ steps.ver.outputs.number }}-${{ matrix.label }}-macOS.dmg"

      - name: Upload arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTDownloader-${{ steps.ver.outputs.tag }}-${{ matrix.label }}
          path: |
            dist/YTDownloader-v${{ steps.ver.outputs.number }}-${{ matrix.label }}-macOS.dmg
            dist/YouTube-Downloader-macOS.dmg
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW="${{ inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          if [[ "$RAW" == v* ]]; then
            echo "tag=$RAW" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$RAW" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all DMG artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: YTDownloader-${{ steps.ver.outputs.tag }}-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: YTDownloader ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## YTDownloader ${{ steps.ver.outputs.tag }}

            ### Which DMG should I download?

            | Your Mac | Download this file |
            |----------|--------------------|
            | **Intel** MacBook / iMac | `YTDownloader-…-**Intel**-macOS.dmg` |
            | **Apple Silicon** M1 / M2 / **M3** / M4 | `YTDownloader-…-**AppleSilicon**-macOS.dmg` |

            Not sure? Apple menu → **About This Mac**  
            - Chip says **Intel** → Intel DMG  
            - Chip says **M1 / M2 / M3 / M4** → AppleSilicon DMG  

            ### Install
            1. Download the matching DMG
            2. Drag **YTDownloader** into **Applications**
            3. Open it — dark web UI opens in your browser
            4. Paste a YouTube URL → Download
            5. Click **Fix tools** if needed ([Homebrew](https://brew.sh))

            ### Run from source
            ```bash
            python3 yt_downloader.py
            ```
          files: |
            release-assets/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
