name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.3.0)"
        required: true
        default: "1.3.0"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build macOS DMG & publish
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW="${{ inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          if [[ "$RAW" == v* ]]; then
            TAG="$RAW"
            NUM="${RAW#v}"
          else
            TAG="v$RAW"
            NUM="$RAW"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "number=$NUM" >> "$GITHUB_OUTPUT"

      - name: Build installable .app + DMG
        env:
          VERSION: ${{ steps.ver.outputs.number }}
        run: |
          chmod +x scripts/build_app.sh
          ./scripts/build_app.sh
          test -d dist/YTDownloader.app
          test -f dist/YouTube-Downloader-macOS.dmg
          cp dist/YouTube-Downloader-macOS.dmg \
            "dist/YTDownloader-${{ steps.ver.outputs.tag }}-macOS.dmg"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTDownloader-${{ steps.ver.outputs.tag }}
          path: |
            dist/YouTube-Downloader-macOS.dmg
            dist/YTDownloader-${{ steps.ver.outputs.tag }}-macOS.dmg
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: YTDownloader ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## YTDownloader ${{ steps.ver.outputs.tag }}

            Free installable build for **Intel** and **Apple Silicon** Macs.

            ### Install
            1. Download **`YouTube-Downloader-macOS.dmg`**
            2. Drag **YTDownloader** into **Applications**
            3. Open it — dark web UI opens in your browser
            4. Paste a YouTube URL → Download
            5. Click **Fix tools** if needed ([Homebrew](https://brew.sh))

            ### Run from source
            ```bash
            python3 yt_downloader.py
            ```

            ### Notes
            - Unsigned open-source build. First open: Right-click → Open.
            - Built by GitHub Actions on macOS.
          files: |
            dist/YouTube-Downloader-macOS.dmg
            dist/YTDownloader-${{ steps.ver.outputs.tag }}-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
