name: Release

# YTDownloader is a Python + web UI app (not a native binary).
# We build BOTH Intel- and AppleSilicon-named DMGs on macos-latest (fast).
# Avoids long queues on scarce macos-13 Intel runners.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.6.0)"
        required: true
        default: "1.6.0"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build DMGs & publish
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RAW="${{ inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          if [[ "$RAW" == v* ]]; then
            TAG="$RAW"
            NUM="${RAW#v}"
          else
            TAG="v$RAW"
            NUM="$RAW"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "number=$NUM" >> "$GITHUB_OUTPUT"

      - name: Build Apple Silicon–named DMG
        env:
          VERSION: ${{ steps.ver.outputs.number }}
          ARCH_LABEL: AppleSilicon
        run: |
          chmod +x scripts/build_app.sh
          ./scripts/build_app.sh
          test -f "dist/YTDownloader-v${{ steps.ver.outputs.number }}-AppleSilicon-macOS.dmg"
          cp "dist/YTDownloader-v${{ steps.ver.outputs.number }}-AppleSilicon-macOS.dmg" \
             "$RUNNER_TEMP/YTDownloader-AppleSilicon.dmg"

      - name: Build Intel–named DMG
        env:
          VERSION: ${{ steps.ver.outputs.number }}
          ARCH_LABEL: Intel
        run: |
          ./scripts/build_app.sh
          test -f "dist/YTDownloader-v${{ steps.ver.outputs.number }}-Intel-macOS.dmg"
          # Restore Apple Silicon DMG (build_app recreates dist/)
          cp "$RUNNER_TEMP/YTDownloader-AppleSilicon.dmg" \
             "dist/YTDownloader-v${{ steps.ver.outputs.number }}-AppleSilicon-macOS.dmg"
          ls -lh dist/*.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YTDownloader-${{ steps.ver.outputs.tag }}
          path: |
            dist/YTDownloader-v${{ steps.ver.outputs.number }}-Intel-macOS.dmg
            dist/YTDownloader-v${{ steps.ver.outputs.number }}-AppleSilicon-macOS.dmg
          if-no-files-found: error
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: YTDownloader ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## YTDownloader ${{ steps.ver.outputs.tag }}

            ### Which DMG should I download?

            | Your Mac | Download this file |
            |----------|--------------------|
            | **Intel** MacBook / iMac | `YTDownloader-…-**Intel**-macOS.dmg` |
            | **Apple Silicon** M1 / M2 / **M3** / M4 | `YTDownloader-…-**AppleSilicon**-macOS.dmg` |

            Not sure? Apple menu → **About This Mac**

            ### Install
            1. Download the matching DMG
            2. Drag **YTDownloader** into **Applications**
            3. Open it (native Mac window)
            4. If macOS blocks it: the app clears quarantine on launch, or run `xattr -cr /Applications/YTDownloader.app`
            5. Paste a URL → Get preview → Download
            6. Use **Check update** in the app for newer releases
            7. **Fix tools** if yt-dlp / ffmpeg are missing ([Homebrew](https://brew.sh))
          files: |
            dist/YTDownloader-v${{ steps.ver.outputs.number }}-Intel-macOS.dmg
            dist/YTDownloader-v${{ steps.ver.outputs.number }}-AppleSilicon-macOS.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
